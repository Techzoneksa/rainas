name: raina

services:
  postgres:
    image: postgres:16-alpine
    container_name: raina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-raina_dev}
      POSTGRES_USER: ${POSTGRES_USER:-raina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raina_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - raina_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  raina_postgres_data:
